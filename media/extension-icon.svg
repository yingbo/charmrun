      <stop offset="0" stop-color="#12263A"/>
      <stop offset="1" stop-color="#08111C"/>
    </linearGradient>
    <linearGradient id="pythonBlue" x1="26" y1="22" x2="68" y2="60" gradientUnits="userSpaceOnUse">
