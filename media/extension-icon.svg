<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">CharmRun extension icon</title>
  <desc id="desc">A Python-inspired badge with two interlocked forms and a play symbol to suggest running Python code.</desc>
